name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython setuptools wheel build

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-dev

      - name: Build compiled wheel
        run: |
          python setup.py build_ext --inplace
          python setup.py bdist_wheel

      - name: Strip source from wheel
        shell: python
        run: |
          import zipfile, glob, os
          whl = glob.glob('dist/*.whl')[0]
          clean = whl + '.clean'
          keep_py = {'__init__.py'}
          with zipfile.ZipFile(whl, 'r') as zin, zipfile.ZipFile(clean, 'w') as zout:
              for item in zin.infolist():
                  if item.filename.endswith('.py') and os.path.basename(item.filename) not in keep_py:
                      continue
                  zout.writestr(item, zin.read(item.filename))
          os.remove(whl)
          os.rename(clean, whl)
          print(f"Cleaned: {whl}")

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
