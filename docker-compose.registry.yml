services:
  deepnetz-registry:
    build:
      context: .
      dockerfile: Dockerfile.registry
    container_name: deepnetz-registry
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - deepnetz-registry-data:/data
    environment:
      - DEEPNETZ_DB_PATH=/data/registry.db
    networks:
      - proxy
      - default

networks:
  proxy:
    external: true

volumes:
  deepnetz-registry-data:
